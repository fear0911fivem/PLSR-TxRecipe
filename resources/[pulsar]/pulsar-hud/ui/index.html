<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Pulsar Framework</title>
    <style>
      :root { color-scheme: normal !important; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: transparent;
        height: 100vh;
        width: 100vw;
        overflow: hidden !important;
        font-family: 'Rajdhani', sans-serif;
      }
      #app { height: 100%; width: 100%; }
    </style>
    <script>
      // Dark background only in local dev so you can see components in the browser
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        document.documentElement.style.background = '#1a1b1e'
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
